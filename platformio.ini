; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:m5stack-dial]
platform = espressif32
; M5Dial uses ESP32-S3, 8MB flash, GC9A01 240x240 display
board = m5stack-stamps3
framework = arduino
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv

build_flags =
    -DARDUINO_M5STACK_DIAL
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=0
    ; Use NimBLE stack — fixes BLE HID disconnect loop on Windows with ESP32-S3
    -DUSE_NIMBLE
    ; Font defines (from original CMakeLists.txt)
    "-DGUI_FONT_CN_BIG=&fonts::efontCN_24"
    "-DGUI_FONT_CN_SMALL=&fonts::efontCN_16_b"
    ; Factory test WiFi credentials (unused unless ENABLE_FACTORY_TEST is defined)
    -DFACTORY_TEST_WIFI_SSID=\"SSID\"
    -DFACTORY_TEST_WIFI_PASSWORD=\"PASSWORD\"
    ; Disable factory test mode (hold button at boot to enter)
    ; -DENABLE_FACTORY_TEST

lib_deps =
    lovyan03/LovyanGFX @ ^1.2.0
    t-vk/ESP32 BLE Keyboard @ ^0.3.2
    h2zero/NimBLE-Arduino @ ^1.4.0

; Filter: exclude the custom ESP-IDF Arduino compat headers (real Arduino framework provides these),
; factory test files (not enabled), and the raw NimBLE C files (replaced by Arduino BLE impl).
build_src_filter =
    +<*>
    -<hal/arduino/>
    -<hal/file_system/>
    -<apps/app_factory_test/>
    -<apps/utilities/adc_read/>
    -<apps/utilities/rgb/>
    -<apps/utilities/wifi_common_test/wifi_factory_test.c>
    -<apps/utilities/ble_demo/ble_demo.c>
    -<apps/utilities/ble_demo/gatt_svr.c>
    -<hal/lvgl/>
