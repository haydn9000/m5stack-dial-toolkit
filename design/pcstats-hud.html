<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M5Dial — PC Stats HUD concept</title>
<style>
  :root{
    --bg:#070b12; --cyan:#00f0ff; --yellow:#fcee0a; --magenta:#ff2a6d;
    --red:#ff003c; --green:#00ff9f; --white:#eaf6ff; --dim:#4e6b7c; --slate:#8fb0c2;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(120% 120% at 50% 0%, #0d1522 0%, #070b12 46%, #02040a 100%);
    color:var(--white); font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; gap:26px; padding:40px 16px; -webkit-font-smoothing:antialiased;
  }
  .dial{
    --size:420px; width:var(--size); height:var(--size); border-radius:50%; padding:18px;
    background:radial-gradient(60% 60% at 38% 30%, #23262b 0%, #14161a 40%, #0a0b0e 72%, #050608 100%);
    box-shadow:0 1px 0 rgba(255,255,255,.06) inset, 0 -14px 34px rgba(0,0,0,.6) inset,
      0 30px 70px -20px rgba(0,0,0,.85), 0 4px 14px rgba(0,0,0,.6); position:relative;
  }
  .dial::after{content:""; position:absolute; inset:9px; border-radius:50%;
    border:1px solid rgba(120,140,160,.10); box-shadow:0 0 0 1px rgba(0,0,0,.6) inset; pointer-events:none;}
  .glass{width:100%; height:100%; border-radius:50%; overflow:hidden; position:relative;
    box-shadow:0 0 40px -8px rgba(0,240,255,.18);}
  canvas{display:block; width:100%; height:100%; border-radius:50%}
  .glass::after{content:""; position:absolute; inset:0; border-radius:50%; pointer-events:none;
    background:radial-gradient(90% 60% at 32% 14%, rgba(255,255,255,.07), rgba(255,255,255,0) 42%);}
  .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:center; max-width:420px}
  button{
    font:inherit; font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--cyan); background:#0b1622; border:1px solid #1e3a4a; border-radius:2px;
    padding:8px 12px; cursor:pointer; transition:border-color .15s, color .15s, background .15s;
  }
  button:hover{border-color:var(--cyan)}
  button.active{background:var(--cyan); color:#04121a; border-color:var(--cyan)}
  button.warn{color:var(--yellow); border-color:#4a4210}
  .hint{color:var(--dim); font-size:11px; letter-spacing:.2em; text-transform:uppercase; text-align:center}
</style>
</head>
<body>
  <div class="dial"><div class="glass"><canvas id="c"></canvas></div></div>
  <div class="row">
    <button id="liveBtn" class="active">Live drift</button>
    <button id="noDataBtn">No data</button>
    <button id="noGpuBtn" class="warn">No GPU</button>
    <button id="bootBtn">Replay boot</button>
  </div>
  <div class="hint">prototype v2 · thick glowing arcs + PCB trace board, wider spacing</div>

<script>
(() => {
  const C = { bg:'#070b12', cyan:'#00f0ff', yellow:'#fcee0a', magenta:'#ff2a6d',
    red:'#ff003c', green:'#00ff9f', white:'#eaf6ff', dim:'#4e6b7c', slate:'#8fb0c2',
    track:'#13293a', border:'#1f4a5e', scan:'#0c1420' };
  const CX=120, D2R=Math.PI/180;
  const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;

  function size(){
    const dpr=Math.min(devicePixelRatio||1,3), w=canvas.clientWidth||420;
    canvas.width=Math.round(w*dpr); canvas.height=Math.round(w*dpr);
    ctx.setTransform(canvas.width/240,0,0,canvas.width/240,0,0);
  }
  new ResizeObserver(size).observe(canvas); size();

  /* Accepts both '#rrggbb' and 'rgb(r,g,b)' strings, so blend()'s output can
     safely be piped back into rgba() (that mismatch — a hex-only parser fed
     an "rgb(...)" string — is what threw a NaN-colour exception here and
     silently killed the whole render loop on the very first frame). */
  function hx(h){
    if(h[0]==='#') return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
    const m=h.match(/[\d.]+/g).map(Number);
    return [m[0],m[1],m[2]];
  }
  function blend(f,b,a){const F=hx(f),B=hx(b);return `rgb(${F[0]*a+B[0]*(1-a)|0},${F[1]*a+B[1]*(1-a)|0},${F[2]*a+B[2]*(1-a)|0})`;}
  const rgba=(h,a)=>{const c=hx(h);return `rgba(${c[0]},${c[1]},${c[2]},${a})`;};

  /* ---- gauges spread wider apart than the original (which had CPU/RAM only
     8px apart and RAM/GPU nearly touching). GPU sits alone at the bottom so
     it gets the biggest radius — it also carries the most text (name+temp). */
  const CPU={cx:64, cy:84,  r:42, col:C.cyan,    label:'CPU'};
  const RAM={cx:176,cy:84,  r:42, col:C.green,   label:'RAM'};
  const GPU={cx:120,cy:188, r:48, col:C.magenta, label:'GPU'};

  let live=true, haveData=true, gpuPresent=true;
  let cpu=42, ram=68, gpu=15, cpuTemp=58, gpuTemp=61;
  let bootStart=performance.now();

  document.getElementById('liveBtn').onclick=e=>{live=!live; e.target.classList.toggle('active',live);};
  document.getElementById('noDataBtn').onclick=e=>{haveData=!haveData; e.target.classList.toggle('active',!haveData);};
  document.getElementById('noGpuBtn').onclick=e=>{gpuPresent=!gpuPresent; e.target.classList.toggle('active',!gpuPresent);};
  document.getElementById('bootBtn').onclick=()=>{ bootStart=performance.now(); };

  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function background(){
    const g=ctx.createLinearGradient(0,0,0,240);
    g.addColorStop(0,blend(C.cyan,C.bg,0.06)); g.addColorStop(1,C.bg);
    ctx.fillStyle=g; ctx.fillRect(0,0,240,240);
    ctx.fillStyle=C.scan; for(let y=0;y<240;y+=4) ctx.fillRect(0,y,240,1);
  }

  /* ---- PCB trace board: right-angle traces linking CPU/RAM/GPU like copper
     traces on a real motherboard, with square via-nodes at every bend and a
     travelling glow pulse per trace — states "one machine" without crossing
     through the gauges' faces the way a straight diagonal line would. ---- */
  const traces=[
    { pts:[[CPU.cx+CPU.r,CPU.cy],[RAM.cx-RAM.r,RAM.cy]], col:blend(CPU.col,RAM.col,.5) },
    { pts:[[RAM.cx,RAM.cy+RAM.r],[RAM.cx,159],[153,159],[GPU.cx+GPU.r*0.72,GPU.cy-GPU.r*0.58]], col:blend(RAM.col,GPU.col,.5) },
    { pts:[[GPU.cx-GPU.r*0.72,GPU.cy-GPU.r*0.58],[87,159],[CPU.cx,159],[CPU.cx,CPU.cy+CPU.r]], col:blend(GPU.col,CPU.col,.5) },
  ];
  function pathLen(pts){let l=0; for(let i=1;i<pts.length;i++){const[ax,ay]=pts[i-1],[bx,by]=pts[i]; l+=Math.hypot(bx-ax,by-ay);} return l;}
  function pointAt(pts,d){
    for(let i=1;i<pts.length;i++){
      const[ax,ay]=pts[i-1],[bx,by]=pts[i], seg=Math.hypot(bx-ax,by-ay);
      if(d<=seg) return [ax+(bx-ax)*(d/seg), ay+(by-ay)*(d/seg)];
      d-=seg;
    }
    return pts[pts.length-1];
  }
  function circuitBoard(t){
    for(const tr of traces){
      ctx.strokeStyle=rgba(C.slate,.35); ctx.lineWidth=1.4;
      ctx.beginPath();
      ctx.moveTo(tr.pts[0][0],tr.pts[0][1]);
      for(let i=1;i<tr.pts.length;i++) ctx.lineTo(tr.pts[i][0],tr.pts[i][1]);
      ctx.stroke();
      for(const [x,y] of tr.pts){
        ctx.fillStyle=rgba(C.slate,.55);
        ctx.fillRect(x-1.5,y-1.5,3,3);
      }
      if(reduce) continue;
      const len=pathLen(tr.pts), period=2600, d=((t+traces.indexOf(tr)*860)%period)/period*len;
      const [px,py]=pointAt(tr.pts,d);
      const grd=ctx.createRadialGradient(px,py,0,px,py,7);
      grd.addColorStop(0,rgba(tr.col,.95)); grd.addColorStop(1,rgba(tr.col,0));
      ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(px,py,7,0,7); ctx.fill();
    }
  }

  function ringGauge(g, pct, wipe){
    const frac=(pct<0?0:pct/100)*wipe;
    ctx.strokeStyle=rgba(C.border,.7); ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(g.cx,g.cy,g.r,0,7); ctx.stroke();
    if(frac>0.002){
      ctx.save();
      ctx.shadowColor=g.col; ctx.shadowBlur=12;
      ctx.strokeStyle=g.col; ctx.lineWidth=9; ctx.lineCap='round';
      ctx.beginPath(); ctx.arc(g.cx,g.cy,g.r,-90*D2R,(-90+360*frac)*D2R); ctx.stroke();
      ctx.restore();
      const th=(-90+360*frac)*D2R;
      ctx.save(); ctx.shadowColor=C.white; ctx.shadowBlur=8;
      ctx.fillStyle=C.white;
      ctx.beginPath(); ctx.arc(g.cx+g.r*Math.cos(th),g.cy+g.r*Math.sin(th),4,0,7); ctx.fill();
      ctx.restore();
    }
  }

  function text(t,x,y,col,px,align,weight){
    ctx.fillStyle=col; ctx.textAlign=align||'center'; ctx.textBaseline='middle';
    ctx.font=`${weight||''} ${px}px ui-monospace, "SF Mono", monospace`;
    ctx.fillText(t,x,y);
  }

  function badge(cx,y,label,col){
    ctx.font='9.5px ui-monospace, monospace';
    const tw=ctx.measureText(label).width, w=tw+14, h=15, x=cx-w/2;
    ctx.fillStyle=rgba(col,.16); roundRect(x,y,w,h,7); ctx.fill();
    ctx.strokeStyle=rgba(col,.6); ctx.lineWidth=1; roundRect(x,y,w,h,7); ctx.stroke();
    ctx.fillStyle=col; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(label,cx,y+h/2+0.5);
  }

  /* Text set along an arc inside one of the small gauges, one character per
     angular step, tangent-rotated. Same technique as the Claude Usage
     rim text — a string like "11.0/16GB" has no room to sit straight
     inside a 42px-radius circle without its corners poking into the ring,
     so it curves along the inside of the gauge's own bottom instead.
     `outward` picks which way is "up": false = toward centre, which is the
     correct flip for text hugging the BOTTOM of a circle. */
  function arcText(str, cx, cy, radius, fromDeg, toDeg, col, px){
    const outward = fromDeg < toDeg;
    ctx.save();
    ctx.fillStyle=col;
    ctx.font=`${px}px ui-monospace, monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const n=str.length;
    for(let i=0;i<n;i++){
      const deg = n===1 ? fromDeg : fromDeg + (toDeg-fromDeg)*i/(n-1);
      const rad = deg*D2R;
      const x=cx+radius*Math.cos(rad), y=cy+radius*Math.sin(rad);
      ctx.save();
      ctx.translate(x,y);
      ctx.rotate(rad + (outward ? Math.PI/2 : -Math.PI/2));
      ctx.fillText(str[i],0,0);
      ctx.restore();
    }
    ctx.restore();
  }

  function gauge(g,pct,temp,subinfo,wipe,curveSubinfo){
    ringGauge(g,pct,wipe);
    if(pct>=0){
      text(`${pct}%`, g.cx, g.cy-13, C.white, 18, 'center', 'bold');
    }else{
      text('N/A', g.cx, g.cy-13, rgba(C.slate,.8), 16, 'center', 'bold');
    }
    text(g.label, g.cx, g.cy+7, blend(g.col,C.white,.15), 10.5, 'center', 'bold');
    if(temp!=null && temp>=0){
      const tcol = temp<60?C.green:(temp<80?C.yellow:C.red);
      badge(g.cx, g.cy+16, `${temp}°C`, tcol);
    }else if(subinfo && curveSubinfo){
      arcText(subinfo, g.cx, g.cy, g.r-11, 150, 30, C.slate, 8);
    }else if(subinfo){
      badge(g.cx, g.cy+16, subinfo, C.slate);
    }
  }

  function livePulse(){
    const on=(Math.floor(performance.now()/450)%2===0);
    ctx.fillStyle= on? C.green : rgba(C.green,.3);
    ctx.beginPath(); ctx.arc(163,20,3,0,7); ctx.fill();
  }

  function noDataPanel(t){
    const x=24,y=64,w=192,h=112;
    ctx.fillStyle=rgba(C.bg,.4); roundRect(x,y,w,h,10); ctx.fill();
    ctx.strokeStyle=rgba(C.cyan,.4); ctx.lineWidth=1.4; roundRect(x,y,w,h,10); ctx.stroke();

    // pulsing chip glyph: a small square die with corner pins, standing in
    // for "no telemetry chip connected yet"
    const pulse=0.8+0.2*Math.sin(t/500);
    const s=15*pulse, cx=120, cy=86;
    ctx.save(); ctx.shadowColor=C.cyan; ctx.shadowBlur=10*pulse;
    ctx.strokeStyle=rgba(C.cyan,.85); ctx.lineWidth=2;
    roundRect(cx-s/2,cy-s/2,s,s,2); ctx.stroke();
    ctx.restore();
    ctx.strokeStyle=rgba(C.cyan,.6); ctx.lineWidth=1.6;
    for(const dx of [-1,1]) for(const dy of [-0.35,0.35]){
      ctx.beginPath();
      ctx.moveTo(cx+dx*s/2, cy+dy*s);
      ctx.lineTo(cx+dx*(s/2+4), cy+dy*s);
      ctx.stroke();
    }

    text('AWAITING DATA', 120, 112, C.white, 13, 'center', 'bold');
    text('BLE   M5DIAL-001', 120, 134, C.slate, 10.5);
    text('USB   sysstat_sender.py <port>', 120, 152, C.slate, 10.5);
    text('ADDR  3C:8A:1F:9B:2E:04', 120, 170, rgba(C.slate,.75), 10);
  }

  function bootInfo(){
    const el=(performance.now()-bootStart);
    const DUR=reduce?0:620;
    return { on: el<DUR, el, dur:DUR };
  }

  let t0=performance.now();
  function frameLoop(now){
    t0=now;
    if(live && haveData){
      cpu = clamp(cpu + (Math.random()-0.5)*3, 4, 96);
      ram = clamp(ram + (Math.random()-0.5)*1.2, 20, 92);
      gpu = clamp(gpu + (Math.random()-0.5)*4, 2, 88);
      cpuTemp = clamp(cpuTemp + (Math.random()-0.5)*0.8, 42, 84);
      gpuTemp = clamp(gpuTemp + (Math.random()-0.5)*0.8, 45, 86);
    }

    background();
    text('PC STATS', 108, 20, C.cyan, 13, 'center', 'bold');
    livePulse();

    if(!haveData){
      noDataPanel(now);
      requestAnimationFrame(frameLoop);
      return;
    }

    const boot=bootInfo();
    const wipe = boot.on ? Math.min(1, boot.el/boot.dur) : 1;

    circuitBoard(now);
    gauge(CPU, Math.round(cpu), Math.round(cpuTemp), null, wipe);
    gauge(RAM, Math.round(ram), null, `${(ram*0.16).toFixed(1)}/16GB`, wipe, true);
    gauge(GPU, gpuPresent?Math.round(gpu):-1, gpuPresent?Math.round(gpuTemp):null, gpuPresent?'RTX 4070':null, wipe);

    if(boot.on){
      const yy=(boot.el/boot.dur)*240;
      const grd=ctx.createLinearGradient(0,yy-14,0,yy+2);
      grd.addColorStop(0,rgba(C.cyan,0)); grd.addColorStop(1,rgba(C.cyan,.28));
      ctx.fillStyle=grd; ctx.fillRect(0,yy-14,240,16);
      ctx.fillStyle=rgba(C.white,.5); ctx.fillRect(0,yy,240,1);
    }

    requestAnimationFrame(frameLoop);
  }
  requestAnimationFrame(frameLoop);
})();
</script>
</body>
</html>
