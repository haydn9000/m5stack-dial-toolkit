<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M5Dial — time-app HUD (neon cyberpunk) concept</title>
<style>
  :root{
    --bg:#070b12; --cyan:#00f0ff; --yellow:#fcee0a; --magenta:#ff2a6d;
    --red:#ff003c; --green:#00ff9f; --white:#eaf6ff; --dim:#4e6b7c;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(120% 120% at 50% 0%, #0d1522 0%, #070b12 46%, #02040a 100%);
    color:var(--white); font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; gap:30px; padding:40px 16px; -webkit-font-smoothing:antialiased;
  }
  .dial{
    --size:420px; width:var(--size); height:var(--size); border-radius:50%; padding:18px;
    background:radial-gradient(60% 60% at 38% 30%, #23262b 0%, #14161a 40%, #0a0b0e 72%, #050608 100%);
    box-shadow:0 1px 0 rgba(255,255,255,.06) inset, 0 -14px 34px rgba(0,0,0,.6) inset,
      0 30px 70px -20px rgba(0,0,0,.85), 0 4px 14px rgba(0,0,0,.6); position:relative;
  }
  .dial::after{content:""; position:absolute; inset:9px; border-radius:50%;
    border:1px solid rgba(120,140,160,.10); box-shadow:0 0 0 1px rgba(0,0,0,.6) inset; pointer-events:none;}
  .glass{width:100%; height:100%; border-radius:50%; overflow:hidden; position:relative;
    box-shadow:0 0 40px -8px rgba(0,240,255,.20);}
  canvas{display:block; width:100%; height:100%; border-radius:50%}
  .glass::after{content:""; position:absolute; inset:0; border-radius:50%; pointer-events:none;
    background:radial-gradient(90% 60% at 32% 14%, rgba(255,255,255,.07), rgba(255,255,255,0) 42%);}
  .row{display:flex; gap:12px; align-items:center}
  button{
    font:inherit; font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--cyan); background:#0b1622; border:1px solid #1e3a4a; border-radius:2px;
    padding:8px 14px; cursor:pointer; transition:border-color .15s, color .15s, background .15s;
  }
  button:hover{border-color:var(--cyan)}
  button.warn{color:var(--yellow); border-color:#4a4210}
  button.alarm{color:var(--red); border-color:#4a1020}
  .hint{color:var(--dim); font-size:11px; letter-spacing:.2em; text-transform:uppercase}
</style>
</head>
<body>
  <div class="dial"><div class="glass"><canvas id="c"></canvas></div></div>
  <div class="row">
    <button id="runBtn">Pause</button>
    <button id="alarmBtn" class="alarm">Alarm</button>
    <button id="bootBtn" class="warn">Replay boot</button>
  </div>
  <div class="hint">prototype · stopwatch shown · states: run / pause / alarm</div>

<script>
(() => {
  const C = { bg:'#070b12', cyan:'#00f0ff', yellow:'#fcee0a', magenta:'#ff2a6d',
    red:'#ff003c', green:'#00ff9f', white:'#eaf6ff', dim:'#4e6b7c',
    track:'#13293a', border:'#1f4a5e', scan:'#0c1420' };
  const CX=120, CY=120, D2R=Math.PI/180;
  const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;

  function size(){
    const dpr=Math.min(devicePixelRatio||1,3), w=canvas.clientWidth||420;
    canvas.width=Math.round(w*dpr); canvas.height=Math.round(w*dpr);
    ctx.setTransform(canvas.width/240,0,0,canvas.width/240,0,0);
  }
  new ResizeObserver(size).observe(canvas); size();

  /* ---- colour helpers ---- */
  const hx=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
  function blend(f,b,a){const F=hx(f),B=hx(b);return `rgb(${F[0]*a+B[0]*(1-a)|0},${F[1]*a+B[1]*(1-a)|0},${F[2]*a+B[2]*(1-a)|0})`;}
  const rgba=(h,a)=>{const c=hx(h);return `rgba(${c[0]},${c[1]},${c[2]},${a})`;};

  /* ---- state ---- */
  let running=true, banked=0, startEpoch=Date.now(), state='RUN';
  let bootStart=performance.now();
  const elapsed=()=> running ? banked + (Date.now()-startEpoch) : banked;
  const accent=()=> state==='ALARM' ? C.red : state==='PAUSE' ? C.yellow : C.cyan;

  document.getElementById('runBtn').onclick=e=>{
    if(running){banked=elapsed(); running=false; state='PAUSE'; e.target.textContent='Run';}
    else{startEpoch=Date.now(); running=true; state='RUN'; e.target.textContent='Pause';}
  };
  document.getElementById('alarmBtn').onclick=()=>{ state = state==='ALARM' ? (running?'RUN':'PAUSE') : 'ALARM'; };
  document.getElementById('bootBtn').onclick=()=>{ bootStart=performance.now(); };

  /* ---- chamfered (cut-corner) rectangle path ---- */
  function chamfer(x,y,w,h,c){
    ctx.beginPath();
    ctx.moveTo(x+c,y); ctx.lineTo(x+w-c,y); ctx.lineTo(x+w,y+c);
    ctx.lineTo(x+w,y+h-c); ctx.lineTo(x+w-c,y+h); ctx.lineTo(x+c,y+h);
    ctx.lineTo(x,y+h-c); ctx.lineTo(x,y+c); ctx.closePath();
  }

  /* ---- background: gradient + scanlines ---- */
  function background(a){
    const g=ctx.createLinearGradient(0,0,0,240);
    g.addColorStop(0,blend(a,C.bg,0.09)); g.addColorStop(1,C.bg);
    ctx.fillStyle=g; ctx.fillRect(0,0,240,240);
    ctx.fillStyle=C.scan; for(let y=0;y<240;y+=4) ctx.fillRect(0,y,240,1);
  }

  /* ---- segmented progress ring (data = cyan/accent) ---- */
  function ring(p,a){
    const N=60, R=108;
    for(let i=0;i<N;i++){
      const th=(-90+360*i/N)*D2R, x=CX+R*Math.cos(th), y=CY+R*Math.sin(th);
      const lit=i < p*N;
      if(lit){
        const t=(p*N-i); const head=t<1;
        ctx.fillStyle=head?C.white:blend(a,C.bg,0.9);
        ctx.beginPath(); ctx.arc(x,y,head?2.4:1.6,0,7); ctx.fill();
      }else{
        ctx.fillStyle=rgba(C.border,.8);
        ctx.beginPath(); ctx.arc(x,y,1,0,7); ctx.fill();
      }
    }
    ctx.strokeStyle=rgba(a,.5); ctx.lineWidth=1; ctx.beginPath(); ctx.arc(CX,CY,116,0,7); ctx.stroke();
  }

  /* ---- asymmetric HUD frame: bold TL bracket, thin BR bracket, rail ---- */
  function frame(a){
    // bold double bracket, top-left (inside the ring)
    ctx.strokeStyle=rgba(a,.85); ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(40,74); ctx.lineTo(40,58); ctx.lineTo(66,58); ctx.stroke();
    ctx.strokeStyle=rgba(a,.35); ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(44,78); ctx.lineTo(44,62); ctx.lineTo(70,62); ctx.stroke();
    // thin bracket, bottom-right
    ctx.strokeStyle=rgba(a,.5); ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(200,166); ctx.lineTo(200,182); ctx.lineTo(174,182); ctx.stroke();

    // left telemetry tick rail (corpo texture) — arc-following short ticks
    ctx.strokeStyle=rgba(C.dim,.9); ctx.lineWidth=1;
    for(let i=0;i<6;i++){ const yy=100+i*8; ctx.beginPath(); ctx.moveTo(30,yy); ctx.lineTo(30+ (i%3===0?9:5),yy); ctx.stroke(); }
    ctx.fillStyle=rgba(C.dim,.9); ctx.font='7px ui-monospace, monospace';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText('SIG',30,92);
  }

  /* ---- REC/status chip, top-right, chamfered ---- */
  function chip(a){
    chamfer(148,58,44,16,4);
    ctx.fillStyle=rgba(a,.12); ctx.fill();
    ctx.strokeStyle=rgba(a,.7); ctx.lineWidth=1; ctx.stroke();
    const on = state!=='PAUSE' && (Math.floor(performance.now()/400)%2===0 || state==='RUN');
    ctx.fillStyle = on ? (state==='ALARM'?C.red:C.yellow) : rgba(C.dim,.6);
    ctx.beginPath(); ctx.arc(157,66,2.6,0,7); ctx.fill();
    ctx.fillStyle=blend(a,C.bg,.9); ctx.font='8px ui-monospace, monospace';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(state==='ALARM'?'ALRM':'REC',164,66);
  }

  /* ---- 7-segment digits (faithful to Font7) ---- */
  const SEG={a:[.14,0,.72,'h'],b:[.86,.06,.44,'v'],c:[.86,.52,.44,'v'],d:[.14,.96,.72,'h'],
    e:[0,.52,.44,'v'],f:[0,.06,.44,'v'],g:[.14,.48,.72,'h']};
  const ON={'0':'abcdef','1':'bc','2':'abged','3':'abgcd','4':'fgbc','5':'afgcd','6':'afgedc','7':'abc','8':'abcdefg','9':'abcfgd'};
  function segPath(s,x,y,w,h,t){const[fx,fy,fl,d]=s;
    if(d==='h'){const sx=x+fx*w,sy=y+fy*h,l=fl*w;ctx.beginPath();ctx.moveTo(sx+t/2,sy-t/2);ctx.lineTo(sx+l-t/2,sy-t/2);ctx.lineTo(sx+l,sy);ctx.lineTo(sx+l-t/2,sy+t/2);ctx.lineTo(sx+t/2,sy+t/2);ctx.lineTo(sx,sy);ctx.closePath();}
    else{const sx=x+fx*w,sy=y+fy*h,l=fl*h;ctx.beginPath();ctx.moveTo(sx-t/2,sy+t/2);ctx.lineTo(sx-t/2,sy+l-t/2);ctx.lineTo(sx,sy+l);ctx.lineTo(sx+t/2,sy+l-t/2);ctx.lineTo(sx+t/2,sy+t/2);ctx.lineTo(sx,sy);ctx.closePath();}}
  function digit(ch,x,y,w,h,col){const t=Math.min(w,h)*.16;const on=ON[ch]||'';
    for(const k in SEG){ctx.fillStyle=on.includes(k)?col:rgba(C.cyan,.05);segPath(SEG[k],x,y,w,h,t);ctx.fill();}}

  /* Big MM:SS with chromatic ghosts. `lock` bitmap decides scramble vs real. */
  function bigTime(chars, col){
    const dw=30,dh=48,gap=7,colonW=12;
    const total=dw*4+gap*4+colonW, x0=CX-total/2, y=CY-dh/2-2;
    const draw=(dx,c)=>{let x=x0+dx;
      digit(chars[0],x,y,dw,dh,c);x+=dw+gap; digit(chars[1],x,y,dw,dh,c);x+=dw+gap;
      ctx.fillStyle=c; ctx.beginPath();ctx.arc(x+colonW/2,y+dh*.34,2.4,0,7);ctx.fill();
      ctx.beginPath();ctx.arc(x+colonW/2,y+dh*.66,2.4,0,7);ctx.fill(); x+=colonW+gap;
      digit(chars[2],x,y,dw,dh,c);x+=dw+gap; digit(chars[3],x,y,dw,dh,c);};
    draw(1.4,blend(C.magenta,C.bg,.55)); draw(-1.4,blend(C.cyan,C.bg,.55)); draw(0,col);
  }

  function text(t,x,y,col,px,align,track){
    ctx.fillStyle=col; ctx.textAlign=align||'center'; ctx.textBaseline='middle';
    ctx.font=`${px}px ui-monospace, "SF Mono", monospace`;
    ctx.fillText(track?t.split('').join(' '):t,x,y);
  }

  /* ---- boot-in decrypt + scanline sweep (the signature) ---- */
  function bootInfo(){
    const el=(performance.now()-bootStart);
    const DUR=reduce?0:780;
    return { on: el<DUR, el, dur:DUR };
  }

  const MON=performance.now();
  function frameLoop(){
    const a=accent();
    const e=elapsed();
    const mm=String(Math.floor(e/60000)%100).padStart(2,'0');
    const ss=String(Math.floor(e/1000)%60).padStart(2,'0');
    const cs=String(Math.floor(e/10)%100).padStart(2,'0');
    const boot=bootInfo();

    background(a);

    // ring wipes in during boot
    let ringP=(e%60000)/60000;
    if(boot.on) ringP*=Math.min(1,boot.el/boot.dur);
    ring(ringP,a);
    frame(a);
    chip(a);

    // header tab (chamfered) + name + yellow highlight underline
    chamfer(62,44,116,17,5);
    ctx.fillStyle=rgba(a,.10); ctx.fill();
    ctx.strokeStyle=rgba(a,.55); ctx.lineWidth=1; ctx.stroke();
    text('STOPWATCH',120,53,blend(a,C.bg,.95),9,'center',true);
    ctx.fillStyle=rgba(C.yellow,.9); ctx.fillRect(66,60,108*Math.min(1,boot.on?boot.el/boot.dur:1),1.5);

    // big readout — scramble per-digit during boot, then lock L->R
    let chars=[mm[0],mm[1],ss[0],ss[1]];
    if(boot.on){
      const lockAt=[120,230,360,500];
      chars=chars.map((c,i)=> boot.el>lockAt[i] ? c : String(Math.floor(Math.random()*10)));
    }
    bigTime(chars, boot.on?blend(C.white,a,.3):C.white);

    // centiseconds — the yellow highlight accent
    if(!boot.on) text('.'+cs, 120, 150, C.yellow, 15, 'center', false);

    // microcopy (corpo terminal texture)
    text('SYS//'+state, 120, 176, blend(a,C.bg,.7), 8, 'center', true);
    text('DIAL-OS 1.1', 120, 192, rgba(C.dim,.9), 7, 'center', true);

    // one-shot scanline sweep on boot
    if(boot.on){
      const yy=(boot.el/boot.dur)*240;
      const grd=ctx.createLinearGradient(0,yy-16,0,yy+2);
      grd.addColorStop(0,rgba(a,0)); grd.addColorStop(1,rgba(a,.35));
      ctx.fillStyle=grd; ctx.fillRect(0,yy-16,240,18);
      ctx.fillStyle=rgba(C.white,.5); ctx.fillRect(0,yy,240,1);
    }

    requestAnimationFrame(frameLoop);
  }
  requestAnimationFrame(frameLoop);
})();
</script>
</body>
</html>
